name: publish-image

# Fires on every version tag (v*.*.*) and on manual dispatch.
# Does two things:
#   1. Builds + pushes a multi-arch container to ghcr.io/bino97/boarnet-sensor.
#   2. Cross-compiles static binaries for linux/darwin × amd64/arm64 and
#      attaches them (plus SHA256SUMS) to the corresponding GitHub Release.
#
# Uses the built-in GITHUB_TOKEN for both GHCR and release-upload — no user
# PAT required.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  # release upload
  packages: write  # ghcr.io push

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bino97/boarnet-sensor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    # Only run on tag push — we don't want manual dispatches producing
    # half-published binaries against non-tagged commits.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Cross-compile
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -trimpath -X main.version=${VERSION}"
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${pair%/*}"; arch="${pair#*/}"
            out="dist/boarnet-${os}-${arch}"
            echo "building ${out}"
            GOOS="${os}" GOARCH="${arch}" go build -ldflags="${LDFLAGS}" -o "${out}" ./cmd/boarnet
          done
          cd dist && sha256sum boarnet-* > SHA256SUMS
          ls -la

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/boarnet-linux-amd64
            dist/boarnet-linux-arm64
            dist/boarnet-darwin-amd64
            dist/boarnet-darwin-arm64
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
